<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <defs>
    <filter id="stucco-noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.12" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <!-- Sky background -->
  <rect width="900" height="200" fill="#87ceeb"/>
  <!-- Ground/concrete -->
  <rect y="520" width="900" height="80" fill="#a09080"/>
  <!-- Wall surface (stucco texture look) -->
  <rect y="180" width="900" height="350" fill="#b8a890"/>
  <rect y="180" width="900" height="350" fill="#c4b49a" opacity="0.6"/>
  <!-- Stucco rough texture via small rects -->
  <rect y="180" width="900" height="350" fill="#bcad95" filter="url(#stucco-noise)"/>
  <!-- Dirt/grime on wall -->
  <rect y="180" width="900" height="350" fill="#6a5040" opacity="0.35"/>
  <!-- Dark stain streaks running down -->
  <rect x="100" y="190" width="30" height="300" fill="#4a3525" opacity="0.5" rx="5"/>
  <rect x="250" y="200" width="20" height="280" fill="#4a3525" opacity="0.4" rx="4"/>
  <rect x="500" y="195" width="25" height="290" fill="#4a3525" opacity="0.45" rx="4"/>
  <rect x="720" y="185" width="35" height="310" fill="#4a3525" opacity="0.4" rx="5"/>
  <!-- Mold patches -->
  <ellipse cx="180" cy="380" rx="80" ry="40" fill="#3a5020" opacity="0.4"/>
  <ellipse cx="600" cy="420" rx="100" ry="35" fill="#3a5020" opacity="0.35"/>
  <!-- Efflorescence (white mineral deposits) -->
  <ellipse cx="350" cy="350" rx="60" ry="20" fill="#e0d8d0" opacity="0.5"/>
  <!-- Concrete floor (also dirty) -->
  <rect y="520" width="900" height="80" fill="#807060" opacity="0.5"/>
  <!-- Dark stain on floor -->
  <ellipse cx="200" cy="550" rx="120" ry="30" fill="#3a2a1a" opacity="0.4"/>
  <ellipse cx="680" cy="560" rx="100" ry="25" fill="#3a2a1a" opacity="0.35"/>
  <!-- MOCK IMAGE label -->
  <rect x="0" y="530" width="900" height="70" fill="rgba(0,0,0,0.65)"/>
  <text x="450" y="558" font-family="Arial, sans-serif" font-size="13" fill="#aaa" text-anchor="middle" font-weight="normal">MOCK IMAGE — Replace with real before photo</text>
  <text x="450" y="582" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">Stucco Wall &amp; Concrete — Before Cleaning</text>
</svg>
