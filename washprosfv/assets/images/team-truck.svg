<svg xmlns="http://www.w3.org/2000/svg" width="900" height="700" viewBox="0 0 900 700">
  <defs>
    <linearGradient id="sky-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8d8e8"/>
      <stop offset="100%" stop-color="#e8eef4"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="900" height="700" fill="url(#sky-grad)"/>
  <!-- Ground/parking lot -->
  <rect y="480" width="900" height="220" fill="#8a8a8a"/>
  <rect y="480" width="900" height="5" fill="#6a6a6a"/>
  <!-- Background buildings/hills -->
  <rect x="0" y="350" width="900" height="135" fill="#b8c8a8" opacity="0.6"/>
  <rect x="50" y="300" width="200" height="185" fill="#c8d8b8" opacity="0.5"/>
  <rect x="700" y="320" width="180" height="165" fill="#c8d8b8" opacity="0.5"/>
  <!-- Truck body (blue WashPro style) -->
  <rect x="180" y="280" width="540" height="200" rx="8" fill="#1565c0"/>
  <!-- Truck cab -->
  <rect x="520" y="200" width="220" height="180" rx="10" fill="#1565c0"/>
  <!-- Cab window -->
  <rect x="535" y="215" width="190" height="100" rx="6" fill="#87ceeb" opacity="0.8"/>
  <rect x="535" y="215" width="190" height="100" rx="6" fill="white" opacity="0.2"/>
  <!-- Truck bed/service body -->
  <rect x="180" y="280" width="340" height="200" rx="4" fill="#1a70cc"/>
  <!-- Ladder rack -->
  <rect x="190" y="260" width="320" height="8" fill="#888" rx="3"/>
  <rect x="190" y="260" width="8" height="20" fill="#888"/>
  <rect x="500" y="260" width="8" height="20" fill="#888"/>
  <line x1="290" y1="260" x2="290" y2="280" stroke="#888" stroke-width="5"/>
  <line x1="390" y1="260" x2="390" y2="280" stroke="#888" stroke-width="5"/>
  <!-- Equipment on truck (hoses/reels) -->
  <circle cx="280" cy="370" r="50" fill="#e8a020" stroke="#c07010" stroke-width="3"/>
  <circle cx="280" cy="370" r="35" fill="#cc8810"/>
  <circle cx="280" cy="370" r="15" fill="#e8a020"/>
  <!-- Water tank -->
  <rect x="350" y="310" width="140" height="120" rx="8" fill="#1880d0"/>
  <text x="420" y="380" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle" font-weight="bold">WATER TANK</text>
  <!-- WashPro branding on truck -->
  <rect x="190" y="295" width="320" height="60" rx="4" fill="#0d47a1" opacity="0.7"/>
  <text x="350" y="335" font-family="Arial, sans-serif" font-size="22" fill="white" text-anchor="middle" font-weight="bold">WashPro SFV</text>
  <!-- Truck wheels -->
  <circle cx="300" cy="490" r="50" fill="#1a1a1a"/>
  <circle cx="300" cy="490" r="35" fill="#333"/>
  <circle cx="300" cy="490" r="15" fill="#555"/>
  <circle cx="620" cy="490" r="50" fill="#1a1a1a"/>
  <circle cx="620" cy="490" r="35" fill="#333"/>
  <circle cx="620" cy="490" r="15" fill="#555"/>
  <!-- Team members (3 stick figures styled) -->
  <!-- Person 1 -->
  <circle cx="120" cy="390" r="22" fill="#4a3520"/>
  <rect x="100" y="412" width="40" height="70" rx="5" fill="#1565c0"/>
  <rect x="98" y="482" width="18" height="40" rx="3" fill="#2a2a50"/>
  <rect x="122" y="482" width="18" height="40" rx="3" fill="#2a2a50"/>
  <!-- Person 2 -->
  <circle cx="790" cy="385" r="22" fill="#5a4030"/>
  <rect x="770" y="407" width="40" height="70" rx="5" fill="#1565c0"/>
  <rect x="768" y="477" width="18" height="40" rx="3" fill="#2a2a50"/>
  <rect x="792" y="477" width="18" height="40" rx="3" fill="#2a2a50"/>
  <!-- Person 3 (center, taller) -->
  <circle cx="455" cy="380" r="24" fill="#6a4f35"/>
  <rect x="433" y="404" width="44" height="75" rx="5" fill="#1565c0"/>
  <rect x="431" y="479" width="19" height="42" rx="3" fill="#2a2a50"/>
  <rect x="456" y="479" width="19" height="42" rx="3" fill="#2a2a50"/>
  <!-- Phone number on truck side -->
  <text x="350" y="365" font-family="Arial, sans-serif" font-size="13" fill="#90caf9" text-anchor="middle">747-202-3622</text>
  <!-- MOCK IMAGE label -->
  <rect x="0" y="630" width="900" height="70" fill="rgba(0,0,0,0.65)"/>
  <text x="450" y="658" font-family="Arial, sans-serif" font-size="13" fill="#aaa" text-anchor="middle" font-weight="normal">MOCK IMAGE — Replace with real team photo</text>
  <text x="450" y="682" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">WashPro SFV Team &amp; Service Truck</text>
</svg>
