<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <defs>
    <filter id="stucco-clean">
      <feTurbulence type="fractalNoise" baseFrequency="0.12" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <!-- Sky background -->
  <rect width="900" height="200" fill="#6ab0d8"/>
  <!-- Trees/foliage in background -->
  <ellipse cx="100" cy="170" rx="80" ry="60" fill="#4a8a20" opacity="0.7"/>
  <ellipse cx="800" cy="160" rx="90" ry="70" fill="#3a7a18" opacity="0.7"/>
  <ellipse cx="450" cy="155" rx="70" ry="55" fill="#4a8a20" opacity="0.5"/>
  <!-- Clean stucco wall -->
  <rect y="180" width="900" height="360" fill="#d4b890"/>
  <rect y="180" width="900" height="360" fill="#dcc49c" opacity="0.7" filter="url(#stucco-clean)"/>
  <!-- Wall cap/top edge -->
  <rect y="175" width="900" height="12" fill="#c0a870"/>
  <!-- Wall looks freshly washed - slightly wet/clean sheen -->
  <rect y="180" width="900" height="360" fill="#f0e8d8" opacity="0.1"/>
  <!-- Clean concrete floor - reddish/terracotta tint (as in real photo) -->
  <rect y="520" width="900" height="80" fill="#b04830"/>
  <rect y="520" width="900" height="80" fill="#c05040" opacity="0.6"/>
  <!-- Wet water pooling (cleaning in progress) -->
  <ellipse cx="300" cy="538" rx="180" ry="15" fill="#1a6090" opacity="0.5"/>
  <ellipse cx="650" cy="542" rx="140" ry="12" fill="#1a6090" opacity="0.4"/>
  <!-- MOCK IMAGE label -->
  <rect x="0" y="530" width="900" height="70" fill="rgba(0,0,0,0.65)"/>
  <text x="450" y="558" font-family="Arial, sans-serif" font-size="13" fill="#aaa" text-anchor="middle" font-weight="normal">MOCK IMAGE — Replace with real after photo</text>
  <text x="450" y="582" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">Stucco Wall &amp; Concrete — After Cleaning</text>
</svg>
