<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <defs>
    <filter id="grime">
      <feTurbulence type="fractalNoise" baseFrequency="0.06" numOctaves="3" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray"/>
      <feBlend in="SourceGraphic" in2="gray" mode="multiply" result="blend"/>
    </filter>
  </defs>
  <!-- Sky/exterior background -->
  <rect width="900" height="600" fill="#7fa8c0"/>
  <!-- Building reflection in dirty glass -->
  <rect width="900" height="600" fill="#b0c4d0" opacity="0.5"/>
  <!-- Glass frame -->
  <rect x="60" y="40" width="380" height="520" fill="#a8bec8" opacity="0.7"/>
  <rect x="460" y="40" width="380" height="520" fill="#a8bec8" opacity="0.7"/>
  <!-- Frame borders -->
  <rect x="55" y="35" width="10" height="530" fill="#5a6a70"/>
  <rect x="835" y="35" width="10" height="530" fill="#5a6a70"/>
  <rect x="55" y="35" width="795" height="10" fill="#5a6a70"/>
  <rect x="55" y="555" width="795" height="10" fill="#5a6a70"/>
  <!-- Center divider -->
  <rect x="448" y="35" width="14" height="530" fill="#5a6a70"/>
  <!-- Horizontal divider -->
  <rect x="55" y="290" width="795" height="10" fill="#5a6a70"/>
  <!-- Dirt streaks on glass -->
  <rect x="60" y="40" width="380" height="520" fill="#8a7a65" opacity="0.3" filter="url(#grime)"/>
  <rect x="460" y="40" width="380" height="520" fill="#8a7a65" opacity="0.3" filter="url(#grime)"/>
  <!-- Water marks / smears -->
  <ellipse cx="200" cy="150" rx="60" ry="30" fill="#c0b090" opacity="0.4"/>
  <ellipse cx="320" cy="400" rx="80" ry="20" fill="#c0b090" opacity="0.35"/>
  <ellipse cx="650" cy="200" rx="70" ry="25" fill="#c0b090" opacity="0.38"/>
  <ellipse cx="580" cy="450" rx="50" ry="18" fill="#c0b090" opacity="0.3"/>
  <!-- Grime build-up at bottom of panes -->
  <rect x="60" y="510" width="380" height="50" fill="#6a5a40" opacity="0.5"/>
  <rect x="460" y="510" width="380" height="50" fill="#6a5a40" opacity="0.5"/>
  <!-- MOCK IMAGE label -->
  <rect x="0" y="530" width="900" height="70" fill="rgba(0,0,0,0.65)"/>
  <text x="450" y="558" font-family="Arial, sans-serif" font-size="13" fill="#aaa" text-anchor="middle" font-weight="normal">MOCK IMAGE — Replace with real photo</text>
  <text x="450" y="582" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">Windows / Glass Doors — Before Cleaning</text>
</svg>
