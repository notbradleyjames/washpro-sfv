<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <defs>
    <pattern id="pavers" x="0" y="0" width="80" height="40" patternUnits="userSpaceOnUse">
      <rect width="80" height="40" fill="#c8b89a"/>
      <rect x="1" y="1" width="78" height="38" fill="#d4c4aa"/>
      <rect x="0" y="0" width="80" height="1" fill="#a89070"/>
      <rect x="0" y="39" width="80" height="1" fill="#a89070"/>
      <rect x="0" y="0" width="1" height="40" fill="#a89070"/>
      <rect x="79" y="0" width="1" height="40" fill="#a89070"/>
    </pattern>
    <pattern id="pavers2" x="40" y="40" width="80" height="40" patternUnits="userSpaceOnUse">
      <rect width="80" height="40" fill="#c8b89a"/>
      <rect x="1" y="1" width="78" height="38" fill="#d4c4aa"/>
      <rect x="0" y="0" width="80" height="1" fill="#a89070"/>
      <rect x="0" y="39" width="80" height="1" fill="#a89070"/>
      <rect x="0" y="0" width="1" height="40" fill="#a89070"/>
      <rect x="79" y="0" width="1" height="40" fill="#a89070"/>
    </pattern>
  </defs>
  <!-- Paver background -->
  <rect width="900" height="480" fill="url(#pavers)"/>
  <rect y="0" x="40" width="900" height="480" fill="url(#pavers2)" opacity="0.5"/>
  <!-- Bright/clean overlay with slight wetness sheen -->
  <rect width="900" height="480" fill="#fff8f0" opacity="0.15"/>
  <!-- Pool water strip at bottom -->
  <rect y="420" width="900" height="180" fill="#2980b9"/>
  <rect y="420" width="900" height="10" fill="#1a6fa0"/>
  <!-- Pool water shimmer -->
  <rect y="435" width="900" height="2" fill="rgba(255,255,255,0.3)"/>
  <rect y="450" width="900" height="2" fill="rgba(255,255,255,0.2)"/>
  <rect y="470" width="900" height="2" fill="rgba(255,255,255,0.25)"/>
  <rect y="490" width="900" height="2" fill="rgba(255,255,255,0.15)"/>
  <!-- MOCK IMAGE label -->
  <rect x="0" y="530" width="900" height="70" fill="rgba(0,0,0,0.65)"/>
  <text x="450" y="558" font-family="Arial, sans-serif" font-size="13" fill="#aaa" text-anchor="middle" font-weight="normal">MOCK IMAGE — Replace with real photo</text>
  <text x="450" y="582" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle" font-weight="bold">Pool Deck / Stone Pavers — After Cleaning</text>
</svg>
